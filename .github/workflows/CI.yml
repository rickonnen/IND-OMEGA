name: CI Monorepo

on:
  push:
    branches: [develop, main, feature/**]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Habilitar pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Instalar dependencias
        run: pnpm install

      - name: Lint general
        run: pnpm run lint

  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Habilitar pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Instalar deps
        run: pnpm install

      - name: Generar Prisma Client
        run: pnpm --filter backend prisma generate --no-engine

      - name: Type check backend
        run: pnpm --filter backend tsc --noEmit

      - name: Type check frontend
        run: pnpm --filter frontend tsc --noEmit

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    steps:
      - uses: actions/checkout@v3

      - name: Habilitar pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Instalar deps
        run: pnpm install

      - name: Generar Prisma Client
        run: pnpm --filter backend prisma generate --no-engine

      - name: Build backend
        run: pnpm --filter backend run build

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    steps:
      - uses: actions/checkout@v3

      - name: Habilitar pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Instalar deps
        run: pnpm install

      - name: Build frontend
        run: pnpm --filter frontend run build